<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bess Brothers Construction - Page under construction. We're working on something great!">
    <title>Under Construction - Bess Brothers Construction</title>
    <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0066FF;
            --primary-green: #7ED321;
            --bg-dark: #2C3E50;
            --bg-darker: #1a252f;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --text-light: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 50%, var(--primary-blue) 100%);
            color: var(--white);
            overflow-x: hidden;
        }

        .construction-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .construction-content {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 4rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-section {
            margin-bottom: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo img {
            width: 50px;
            height: 50px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            font-weight: 700;
            font-size: 1.25rem;
            line-height: 1.2;
        }

        .brand-text .blue {
            color: var(--primary-blue);
        }

        .brand-text .green {
            color: var(--primary-green);
        }

        .construction-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .message {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.8;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 2rem 0;
        }

        .progress-fill {
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, var(--primary-green) 0%, var(--primary-blue) 100%);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite;
        }

        @keyframes progress {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(166.67%);
            }
        }

        .contact-info {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .contact-info h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
            color: var(--primary-green);
        }

        .contact-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            align-items: center;
        }

        .contact-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            color: var(--primary-green);
        }

        /* Background decoration */
        .construction-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 800" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>') no-repeat center;
            opacity: 0.3;
            background-size: cover;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .construction-content {
                padding: 3rem 1.5rem;
            }

            h1 {
                font-size: 2rem;
            }

            .construction-icon {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="construction-container">
        <div class="construction-content">
            <div class="logo-section">
                <div class="logo">
                    <img src="images/emblem.svg" alt="Bess Brothers Construction Logo">
                    <div class="brand-text">
                        <span class="blue">BESS BROTHERS</span>
                        <span class="green">CONSTRUCTION</span>
                    </div>
                </div>
            </div>

            <span class="construction-icon">🚧</span>
            
            <h1>Under Construction</h1>
            
            <p class="subtitle">We're building something great!</p>
            
            <p class="message">
                This page is currently being renovated to serve you better. 
                We'll be back soon with fresh content and improved features.
            </p>
            
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            
            <div class="contact-info">
                <h2>Need Help? Contact Us</h2>
                <div class="contact-links">
                    <a href="tel:+16154237450">📞 (615) 423-7450</a>
                    <a href="mailto:business@bessbrothers.com">✉️ business@bessbrothers.com</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
